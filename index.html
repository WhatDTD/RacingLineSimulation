<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLS</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
</head>
<body>
    <div id="content">
        <div id="topbar">
            <img id="whatdtdIcon"alt="WhatDTD" height="80px">
            <img id="githubIcon" alt="github" height="80px">
        </div>

        <div id="header">
            <img src="assets/noBackgroundRLS.svg" alt="Racing Line Simulation">
            <div id="buttons">
                <button id="createCarButton">Create car<span>→</span></button>
                <button id="createLineButton">Create line<span>→</span></button>
                <button id="createSimulationButton">Create simulation<span>→</span></button>
                <button id="viewSimulationButton">View simulation<span>→</span></button>
            </div>
        </div>

        <div id="bottombar">
            <button id="downloadExample">Download Simulation Examples</button>
        </div>
    </div>
</body>
</html>
