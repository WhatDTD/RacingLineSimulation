<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <title>RLS Simulation Setup</title>
    <link rel="stylesheet" href="style.css"></link>
    <link rel="icon" type="image/x-icon" href="/images/RLSlogo.ico">
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="tabHtml.js"></script>
    <script src="script.js"></script>
    <script src="lapCalculation.js"></script>
    <script src="downloads.js"></script>
  </head>
  <body>
    <canvas id="canvas" tabindex="1"></canvas>

    <div class="columns" id="ui">
      <div class="box">
        <div class="title is-5" id="uiTitle">
          Simulation Setup
        </div>
        <hr>

        <!--start of content-->
        <div id="content">
          <div id="noCar">Load a Car to Setup the Simulation</div>
        </div>

        <div class="flex" id="InputsButtonsLine">
            <button class="inputButton button is-link is-light mt-2" id="selectCar">
                <input class="file-input" type="file" name="importedCar" accept=".RLSdata" id="selectCarIn"/>
                <span>↑ Select Car</span>
            </button>

            <button class="inputButton buttonMargin button is-info is-dark mt-2" id="selectTrack">
                <input class="file-input" type="file" name="importedCarTrack" id="selectTrackIn" accept=".glb"/>
                <span>↑ Select Track</span>
            </button>

            <button class="inputButton buttonMargin button is-link mt-2" id="selectLine">
              <input class="file-input" type="file" name="importedCarLine" accept=".json" id="selectLineIn"/>
              <span>↑ Select Line</span>
            </button>
        </div>

        <div id="RunSimLine">
          <button class="button is-info mt-2 uiBtn" id="RunSimulation" disabled>
              <span id="RunSimulationSpan" title="Select all components to Proceed">Run Simulation</span>
          </button>
        </div>
      </div>
      <button id="menuToggle" class="button bd-docs-button mt-5">&lt</button>
    </div>
  </body>
</html>
